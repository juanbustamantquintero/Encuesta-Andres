<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Qué tanto conoces a Andrés o Bus?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a6b3a;
      --primary-light: #d4f0e0;
      --primary-mid: #2d9e5f;
      --success: #2d9e5f;
      --success-light: #d4f0e0;
      --error: #A32D2D;
      --error-light: #FCEBEB;
      --bg-page: #080f0b;
      --bg-card: #0e1a12;
      --bg-opt: rgba(255,255,255,0.04);
      --bg-opt-hover: rgba(45,158,95,0.1);
      --border: rgba(255,255,255,0.09);
      --border-hover: rgba(45,158,95,0.6);
      --text-main: #e8f5ee;
      --text-muted: #7aab8e;
      --text-faint: #3d6b50;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-page);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      overflow: hidden;
    }

    /* Ambient background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 400px; height: 400px;
      background: #1D9E75;
      top: -100px; right: -80px;
    }
    body::after {
      width: 350px; height: 350px;
      background: #0f5c2e;
      bottom: -100px; left: -60px;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.25rem 2.5rem 2.75rem;
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    /* Accent top bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #1D9E75 0%, #97C459 50%, #2d9e5f 100%);
    }

    /* Meta row */
    .meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.75rem;
    }

    .q-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-faint);
      white-space: nowrap;
    }

    .progress-track {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #1D9E75, #97C459);
      border-radius: 2px;
      transition: width 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    .score-pill {
      font-size: 11px;
      font-weight: 700;
      color: #97C459;
      background: rgba(29,158,117,0.15);
      border: 1px solid rgba(29,158,117,0.25);
      padding: 4px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* Question */
    .question-text {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.3rem;
      line-height: 1.55;
      color: var(--text-main);
      margin-bottom: 1.5rem;
      min-height: 68px;
      transition: opacity 0.2s;
    }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .opt {
      background: var(--bg-opt);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text-main);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }

    .opt:hover:not(:disabled) {
      background: var(--bg-opt-hover);
      border-color: var(--border-hover);
      transform: translateX(5px);
    }

    .opt-letter {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-faint);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      letter-spacing: 0;
    }

    .opt:hover:not(:disabled) .opt-letter {
      background: rgba(29,158,117,0.2);
      border-color: rgba(29,158,117,0.5);
      color: #97C459;
    }

    .opt.correct {
      background: rgba(99,153,34,0.15);
      border-color: rgba(99,153,34,0.5);
      color: #C0DD97;
    }
    .opt.correct .opt-letter {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .opt.wrong {
      background: rgba(163,45,45,0.15);
      border-color: rgba(163,45,45,0.5);
      color: #F7C1C1;
    }
    .opt.wrong .opt-letter {
      background: var(--error);
      border-color: var(--error);
      color: white;
    }

    /* Result screen */
    #result-screen {
      display: none;
      text-align: center;
      padding: 1rem 0 0.5rem;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.75rem;
    }

    .result-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.6rem;
      color: var(--text-main);
      margin-bottom: 0.25rem;
    }

    .score-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      margin: 1.25rem 0 1rem;
    }

    .score-big {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 4.5rem;
      line-height: 1;
      background: linear-gradient(135deg, #97C459, #1D9E75);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .score-denom {
      font-size: 1.75rem;
      color: var(--text-faint);
      align-self: flex-end;
      margin-bottom: 8px;
      font-family: 'DM Serif Display', Georgia, serif;
    }

    .dots-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .dot {
      width: 36px;
      height: 7px;
      border-radius: 4px;
    }
    .dot.hit { background: #639922; }
    .dot.miss { background: #A32D2D; }

    .result-msg {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 2rem;
      font-style: italic;
    }

    .btn-restart {
      padding: 12px 32px;
      background: linear-gradient(135deg, #1a6b3a, #2d9e5f);
      border: none;
      color: white;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      letter-spacing: 0.03em;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 20px rgba(29,158,117,0.35);
    }
    .btn-restart:hover { opacity: 0.9; transform: scale(1.03); }
    .btn-restart:active { transform: scale(0.97); }
  </style>
</head>
<body>

<div class="card">
  <!-- Header title -->
  <div style="text-align:center; margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border);">
    <p style="font-size:11px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-faint); margin-bottom:6px;">¿Qué tanto conoces a</p>
    <h1 style="font-family:'DM Serif Display',Georgia,serif; font-size:1.55rem; color:var(--text-main); line-height:1.2;">Andrés <span style="color:#2d9e5f;">o Bus</span>?</h1>
  </div>
  <div id="quiz-screen">
    <div class="meta">
      <span class="q-label" id="q-label">1 de 5</span>
      <div class="progress-track">
        <div class="progress-fill" id="prog"></div>
      </div>
      <span class="score-pill" id="score-pill">0 pts</span>
    </div>
    <p class="question-text" id="q-text"></p>
    <div class="options" id="opts"></div>
  </div>

  <!-- Result screen -->
  <div id="result-screen"></div>
</div>

<script>
  const questions = [
    {
      q: "Si me dices que vamos por comida, ¿qué es lo primero que espero que elijas?",
      options: ["Una buena pizza", "La vieja confiable: Hamburguesa", "Sushi bien elaborado", "Tacos al pastor"],
      correct: 1
    },
    {
      q: "¿En qué gasto la mayor parte de mi tiempo libre sin darme cuenta?",
      options: ["Viendo series en maratón", "Salir a tomar fotos", "En el mundo de los videojuegos", "Editando fotos"],
      correct: 2
    },
    {
      q: "Si hoy mismo me regalan un pasaje de avión, ¿a dónde despego?",
      options: ["A las playas de Bora Bora", "Directo a Japón", "Un tour por Europa", "Nueva York"],
      correct: 1
    },
    {
      q: "¿Cuál es mi mayor 'maña' o rasgo curioso?",
      options: ["Hablo solo/a a veces", "Me distraigo totalmente de mi entorno", "Tengo que ordenar todo por colores", "Soy adicto/a al café"],
      correct: 1
    },
    {
      q: "¿Cuál sería mi concierto soñado?",
      options: ["Feid", "Bad Bunny", "Andrés Cepeda", "Don Omar"],
      correct: 2
    },
    {
      q: "¿Qué quería ser cuando era pequeño/a (aunque no lo creas)?",
      options: ["Fotógrafo", "Editor de video", "Basquetbolista", "Mariachi"],
      correct: 3
    }
  ];

  const letters = ['A','B','C','D'];
  let cur = 0, score = 0, hits = [];

  function render() {
    const q = questions[cur];
    document.getElementById('q-label').textContent = `${cur + 1} de ${questions.length}`;
    document.getElementById('prog').style.width = `${(cur / questions.length) * 100}%`;
    document.getElementById('score-pill').textContent = `${score} pts`;
    document.getElementById('q-text').textContent = q.q;

    const c = document.getElementById('opts');
    c.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
      btn.onclick = () => pick(i, btn);
      c.appendChild(btn);
    });
  }

  function pick(i, btn) {
    const correct = questions[cur].correct;
    const allBtns = document.querySelectorAll('.opt');
    allBtns.forEach(b => b.disabled = true);

    const isRight = i === correct;
    if (isRight) { btn.classList.add('correct'); score++; hits.push(true); }
    else { btn.classList.add('wrong'); allBtns[correct].classList.add('correct'); hits.push(false); }

    setTimeout(() => {
      cur++;
      if (cur < questions.length) render();
      else showResult();
    }, 1400);
  }

  function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    const rs = document.getElementById('result-screen');
    rs.style.display = 'block';

    let emoji, title, msg;
    if (score === 6)      { emoji = '🏆'; title = '¡Me conoces de memoria!'; msg = 'Eres del círculo íntimo. Nadie sabe más de mí que tú.'; }
    else if (score >= 4)  { emoji = '✨'; title = '¡Nada mal!'; msg = 'Se nota que prestas atención cuando hablamos. Buen trabajo.'; }
    else if (score >= 2)  { emoji = '😅'; title = 'Casi…'; msg = 'Parece que necesitamos vernos más seguido para conocernos mejor.'; }
    else                  { emoji = '👀'; title = '¿Nos conocemos?'; msg = 'Uy… Definitivamente necesitamos pasar más tiempo juntos.'; }

    const dots = hits.map(h => `<div class="dot ${h ? 'hit' : 'miss'}"></div>`).join('');

    rs.innerHTML = `
      <span class="result-emoji">${emoji}</span>
      <h2 class="result-title">${title}</h2>
      <div class="score-row">
        <span class="score-big">${score}</span>
        <span class="score-denom">/ ${questions.length}</span>
      </div>
      <div class="dots-row">${dots}</div>
      <p class="result-msg">${msg}</p>
      <button class="btn-restart" onclick="location.reload()">Intentar de nuevo</button>
    `;
  }

  render();
</script>
</body>
</html>
